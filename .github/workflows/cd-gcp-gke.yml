name: CD GCP GKE

on:
  workflow_dispatch:
  workflow_run:
    workflows:
      - CI
    types:
      - completed

permissions:
  contents: read
  id-token: write

env:
  GCP_PROJECT_ID: ${{ vars.GCP_PROJECT_ID }}
  GCP_REGION: ${{ vars.GCP_REGION }}
  GAR_REPOSITORY: ${{ vars.GAR_REPOSITORY }}
  GKE_CLUSTER: ${{ vars.GKE_CLUSTER }}
  GKE_LOCATION: ${{ vars.GKE_LOCATION }}
  BACKEND_IMAGE_NAME: nexumdesk-backend
  FRONTEND_IMAGE_NAME: nexumdesk-frontend
  NAMESPACE: nexumdesk
  DEPLOY_SHA: ${{ github.event.workflow_run.head_sha || github.sha }}

jobs:
  deploy-gke:
    if: ${{ github.event_name == 'workflow_dispatch' || (github.event.workflow_run.conclusion == 'success' && github.event.workflow_run.head_branch == 'main') }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ env.DEPLOY_SHA }}

      - name: Validate required configuration
        shell: bash
        run: |
          test -n "${GCP_PROJECT_ID}" || (echo "Missing repository variable GCP_PROJECT_ID" && exit 1)
          test -n "${GCP_REGION}" || (echo "Missing repository variable GCP_REGION" && exit 1)
          test -n "${GAR_REPOSITORY}" || (echo "Missing repository variable GAR_REPOSITORY" && exit 1)
          test -n "${GKE_CLUSTER}" || (echo "Missing repository variable GKE_CLUSTER" && exit 1)
          test -n "${GKE_LOCATION}" || (echo "Missing repository variable GKE_LOCATION" && exit 1)

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}

      - name: Setup gcloud SDK
        uses: google-github-actions/setup-gcloud@v2
        with:
          project_id: ${{ env.GCP_PROJECT_ID }}

      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker ${{ env.GCP_REGION }}-docker.pkg.dev --quiet

      - name: Get GKE credentials
        uses: google-github-actions/get-gke-credentials@v2
        with:
          cluster_name: ${{ env.GKE_CLUSTER }}
          location: ${{ env.GKE_LOCATION }}
          project_id: ${{ env.GCP_PROJECT_ID }}

      - name: Derive image metadata
        id: meta
        shell: bash
        run: |
          REGISTRY_PATH="${GCP_REGION}-docker.pkg.dev/${GCP_PROJECT_ID}/${GAR_REPOSITORY}"
          echo "registry_path=${REGISTRY_PATH}" >> "$GITHUB_OUTPUT"
          echo "backend_image=${REGISTRY_PATH}/${BACKEND_IMAGE_NAME}:${DEPLOY_SHA}" >> "$GITHUB_OUTPUT"
          echo "frontend_image=${REGISTRY_PATH}/${FRONTEND_IMAGE_NAME}:${DEPLOY_SHA}" >> "$GITHUB_OUTPUT"

      - name: Build and push backend image
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          push: true
          tags: |
            ${{ steps.meta.outputs.backend_image }}
            ${{ steps.meta.outputs.registry_path }}/${{ env.BACKEND_IMAGE_NAME }}:latest

      - name: Build and push frontend image
        uses: docker/build-push-action@v6
        with:
          context: ./frontend
          push: true
          build-args: |
            VITE_API_URL=/api/v1
          tags: |
            ${{ steps.meta.outputs.frontend_image }}
            ${{ steps.meta.outputs.registry_path }}/${{ env.FRONTEND_IMAGE_NAME }}:latest

      - name: Ensure namespace exists
        run: kubectl apply -f k8s/namespace.yaml

      - name: Create or update JWT secret
        shell: bash
        env:
          JWT_SECRET: ${{ secrets.JWT_SECRET }}
        run: |
          kubectl create secret generic nexumdesk-secrets \
            --from-literal=jwt-secret="${JWT_SECRET}" \
            -n "${NAMESPACE}" \
            --dry-run=client -o yaml | kubectl apply -f -

      - name: Apply Kubernetes manifests
        shell: bash
        run: |
          if ! kubectl get pvc nexumdesk-sqlite-pvc-v2 -n "${NAMESPACE}" >/dev/null 2>&1; then
            kubectl apply -f k8s/backend-pvc.yaml
          else
            echo "PVC nexumdesk-sqlite-pvc-v2 already exists; skipping immutable PVC apply."
          fi
          kubectl apply -f k8s/backend.yaml
          kubectl apply -f k8s/frontend.yaml
          kubectl apply -f k8s/ingress.yaml

      - name: Set deployed images
        run: |
          kubectl set image deployment/nexumdesk-backend \
            backend=${{ steps.meta.outputs.backend_image }} \
            -n "${NAMESPACE}"
          kubectl set image deployment/nexumdesk-frontend \
            frontend=${{ steps.meta.outputs.frontend_image }} \
            -n "${NAMESPACE}"

      - name: Wait for rollout
        shell: bash
        run: |
          if ! kubectl rollout status deployment/nexumdesk-backend -n "${NAMESPACE}" --timeout=300s; then
            echo "=== Pods ==="
            kubectl get pods -n "${NAMESPACE}" -o wide || true
            echo "=== Backend deployment describe ==="
            kubectl describe deployment nexumdesk-backend -n "${NAMESPACE}" || true
            BACKEND_POD="$(kubectl get pods -n "${NAMESPACE}" -l app=nexumdesk-backend -o jsonpath='{.items[0].metadata.name}' 2>/dev/null || true)"
            if [ -n "${BACKEND_POD}" ]; then
              echo "=== Backend pod describe ==="
              kubectl describe pod "${BACKEND_POD}" -n "${NAMESPACE}" || true
              echo "=== Backend logs ==="
              kubectl logs "${BACKEND_POD}" -n "${NAMESPACE}" --tail=200 || true
              echo "=== Backend previous logs ==="
              kubectl logs "${BACKEND_POD}" -n "${NAMESPACE}" --previous --tail=200 || true
            fi
            echo "=== Namespace events ==="
            kubectl get events -n "${NAMESPACE}" --sort-by=.lastTimestamp || true
            exit 1
          fi
          kubectl rollout status deployment/nexumdesk-frontend -n "${NAMESPACE}" --timeout=300s
