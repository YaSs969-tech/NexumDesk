name: CD

on:
  workflow_dispatch:
  push:
    branches:
      - main

permissions:
  contents: read
  packages: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      REGISTRY: ghcr.io
      KUBE_CONFIG: ${{ secrets.KUBE_CONFIG }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Derive image metadata
        id: meta
        shell: bash
        run: |
          OWNER_LC="$(echo "${GITHUB_REPOSITORY_OWNER}" | tr '[:upper:]' '[:lower:]')"
          echo "owner_lc=${OWNER_LC}" >> "$GITHUB_OUTPUT"
          echo "backend_image=${REGISTRY}/${OWNER_LC}/nexumdesk-backend" >> "$GITHUB_OUTPUT"
          echo "frontend_image=${REGISTRY}/${OWNER_LC}/nexumdesk-frontend" >> "$GITHUB_OUTPUT"

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push backend image
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          push: true
          tags: |
            ${{ steps.meta.outputs.backend_image }}:latest
            ${{ steps.meta.outputs.backend_image }}:${{ github.sha }}

      - name: Build and push frontend image
        uses: docker/build-push-action@v6
        with:
          context: ./frontend
          push: true
          tags: |
            ${{ steps.meta.outputs.frontend_image }}:latest
            ${{ steps.meta.outputs.frontend_image }}:${{ github.sha }}

      - name: Configure kubectl
        if: env.KUBE_CONFIG != ''
        run: |
          mkdir -p ~/.kube
          echo "$KUBE_CONFIG" | base64 -d > ~/.kube/config

      - name: Setup Terraform
        if: env.KUBE_CONFIG != '' && vars.DEPLOY_WITH_TERRAFORM == 'true'
        uses: hashicorp/setup-terraform@v3

      - name: Terraform deploy
        if: env.KUBE_CONFIG != '' && vars.DEPLOY_WITH_TERRAFORM == 'true'
        working-directory: infra/terraform
        env:
          TF_VAR_backend_image: ${{ steps.meta.outputs.backend_image }}:${{ github.sha }}
          TF_VAR_frontend_image: ${{ steps.meta.outputs.frontend_image }}:${{ github.sha }}
          TF_VAR_jwt_secret: ${{ secrets.JWT_SECRET }}
        run: |
          terraform init -input=false
          terraform apply -auto-approve -input=false

      - name: Deploy manifests
        if: env.KUBE_CONFIG != '' && vars.DEPLOY_WITH_TERRAFORM != 'true'
        run: |
          kubectl apply -f k8s/namespace.yaml
          kubectl apply -f k8s/
          kubectl set image deployment/nexumdesk-backend \
            backend=${{ steps.meta.outputs.backend_image }}:${{ github.sha }} \
            -n nexumdesk
          kubectl set image deployment/nexumdesk-frontend \
            frontend=${{ steps.meta.outputs.frontend_image }}:${{ github.sha }} \
            -n nexumdesk
          kubectl rollout status deployment/nexumdesk-backend -n nexumdesk --timeout=120s
          kubectl rollout status deployment/nexumdesk-frontend -n nexumdesk --timeout=120s

      - name: Skip Kubernetes deploy (no KUBE_CONFIG)
        if: env.KUBE_CONFIG == ''
        run: echo "KUBE_CONFIG is not configured. Images were pushed, deploy step skipped."
