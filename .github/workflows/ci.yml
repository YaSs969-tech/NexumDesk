name: CI

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

env:
  CI: true

jobs:
  infra:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Create placeholder kubeconfig for validation
        shell: bash
        run: |
          mkdir -p "${HOME}/.kube"
          cat > "${HOME}/.kube/config" <<'EOF'
          apiVersion: v1
          kind: Config
          clusters: []
          contexts: []
          current-context: ""
          users: []
          EOF

      - name: Terraform fmt check
        working-directory: infra/terraform
        run: terraform fmt -check -no-color

      - name: Terraform init (no backend)
        working-directory: infra/terraform
        run: terraform init -backend=false -input=false -no-color

      - name: Terraform validate
        working-directory: infra/terraform
        run: terraform validate -no-color

      - name: Validate Kubernetes manifest syntax
        shell: bash
        run: |
          python - <<'PY'
          from pathlib import Path
          import sys
          import yaml

          manifest_paths = [
              Path("k8s/namespace.yaml"),
              Path("k8s/backend-pvc.yaml"),
              Path("k8s/backend.yaml"),
              Path("k8s/frontend.yaml"),
              Path("k8s/ingress.yaml"),
          ]

          for manifest_path in manifest_paths:
              with manifest_path.open("r", encoding="utf-8") as handle:
                  documents = list(yaml.safe_load_all(handle))

              if not documents:
                  raise SystemExit(f"{manifest_path} does not contain any YAML documents")

              for index, document in enumerate(documents, start=1):
                  if document is None:
                      continue
                  if not isinstance(document, dict):
                      raise SystemExit(
                          f"{manifest_path} document #{index} is not a YAML mapping"
                      )

                  for required_key in ("apiVersion", "kind", "metadata"):
                      if required_key not in document:
                          raise SystemExit(
                              f"{manifest_path} document #{index} is missing '{required_key}'"
                          )

          print("Kubernetes manifests parsed successfully.")
          PY

  backend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 18
          cache: npm
          cache-dependency-path: backend/package-lock.json

      - name: Install deps
        run: npm ci

      - name: Build
        run: npm run build

      - name: Unit tests
        run: npm test

  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install deps
        run: npm ci

      - name: Build
        run: npm run build

      - name: Unit tests
        run: npm test
