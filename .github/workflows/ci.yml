name: CI

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

env:
  CI: true

jobs:
  infra:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Create placeholder kubeconfig for validation
        shell: bash
        run: |
          mkdir -p "${HOME}/.kube"
          cat > "${HOME}/.kube/config" <<'EOF'
          apiVersion: v1
          kind: Config
          clusters: []
          contexts: []
          current-context: ""
          users: []
          EOF

      - name: Terraform fmt check
        working-directory: infra/terraform
        run: terraform fmt -check -no-color

      - name: Terraform init (no backend)
        working-directory: infra/terraform
        run: terraform init -backend=false -input=false -no-color

      - name: Terraform validate
        working-directory: infra/terraform
        run: terraform validate -no-color

      - name: Setup kubectl
        uses: azure/setup-kubectl@v4

      - name: Kubernetes manifests dry-run
        run: |
          kubectl create --dry-run=client --validate=false -f k8s/namespace.yaml -o yaml > /dev/null
          kubectl create --dry-run=client --validate=false -f k8s/backend-pvc.yaml -o yaml > /dev/null
          kubectl create --dry-run=client --validate=false -f k8s/backend.yaml -o yaml > /dev/null
          kubectl create --dry-run=client --validate=false -f k8s/frontend.yaml -o yaml > /dev/null
          kubectl create --dry-run=client --validate=false -f k8s/ingress.yaml -o yaml > /dev/null

  backend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 18
          cache: npm
          cache-dependency-path: backend/package-lock.json

      - name: Install deps
        run: npm ci

      - name: Build
        run: npm run build

      - name: Unit tests
        run: npm test

  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install deps
        run: npm ci

      - name: Build
        run: npm run build

      - name: Unit tests
        run: npm test
