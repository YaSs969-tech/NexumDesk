# NexumDesk – Kubernetes Secret example
#
# Create this secret before applying backend.yaml.
# Replace <base64-encoded-secret> with your actual value:
#
#   echo -n "YourRealJWTSecretHere" | base64
#
# Apply:
#   kubectl apply -f k8s/secret.example.yaml
#
# Or create imperatively (recommended for CI):
#   kubectl create secret generic nexumdesk-secrets \
#     --from-literal=jwt-secret="YourRealJWTSecretHere" \
#     -n nexumdesk

apiVersion: v1
kind: Secret
metadata:
  name: nexumdesk-secrets
  namespace: nexumdesk
type: Opaque
data:
  # base64("change-me-in-production") – REPLACE with a real random secret
  jwt-secret: Y2hhbmdlLW1lLWluLXByb2R1Y3Rpb24=
