apiVersion: apps/v1
kind: Deployment
metadata:
  name: nexumdesk-frontend
  namespace: nexumdesk
spec:
  replicas: 1
  selector:
    matchLabels:
      app: nexumdesk-frontend
  template:
    metadata:
      labels:
        app: nexumdesk-frontend
    spec:
      containers:
        - name: frontend
          image: nexumdesk-frontend:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 80
          resources:
            requests:
              cpu: "50m"
              memory: "64Mi"
            limits:
              cpu: "200m"
              memory: "128Mi"
          livenessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 10
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 5
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: nexumdesk-frontend
  namespace: nexumdesk
spec:
  type: LoadBalancer
  selector:
    app: nexumdesk-frontend
  ports:
    - name: http
      port: 80
      targetPort: 80
